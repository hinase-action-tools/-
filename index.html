<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="営業・ダイエット・勉強など、あらゆる目標を行動プロセスで管理する無料ツール">
<title>行動管理ダッシュボード — 無料で使える行動記録ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f8f7f4;--bg3:#efedea;
  --text:#18181a;--text2:#52514e;--text3:#96948e;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);
  --blue:#1560b8;--blue-bg:#e6f0fc;--blue-text:#0b3878;
  --green:#0a7a56;--green-bg:#e1f4ec;--green-text:#064d36;
  --amber:#8e5c0e;--amber-bg:#fdf2da;--amber-text:#54360a;
  --red:#aa2c2c;--red-bg:#fdebeb;--red-text:#721a1a;
  --r:10px;--rsm:7px;--rlg:16px;
  --font:'Hiragino Sans','Noto Sans JP','Yu Gothic',system-ui,sans-serif;
  --shadow:0 1px 6px rgba(0,0,0,0.07);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#18181a;--bg2:#222220;--bg3:#2a2a27;
    --text:#e6e4de;--text2:#a4a29c;--text3:#666460;
    --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);
    --blue:#4a9ce0;--blue-bg:#0d2240;--blue-text:#90c8f8;
    --green:#28b882;--green-bg:#092c20;--green-text:#68d8b0;
    --amber:#e0a030;--amber-bg:#2a1e08;--amber-text:#f8d080;
    --red:#e04848;--red-bg:#2a0e0e;--red-text:#f89090;
    --shadow:0 1px 6px rgba(0,0,0,0.3);
  }
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

/* ── LP風ヘッダー ── */
.lp-header{background:var(--blue-bg);border-bottom:1px solid var(--border);padding:18px 16px 16px}
.lp-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.lp-title{font-size:20px;font-weight:800;letter-spacing:-.4px}
.lp-sub{font-size:12px;color:var(--text2);margin-top:2px}
.lp-badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-free{background:var(--green-bg);color:var(--green-text);border:1px solid var(--green)}
.badge-local{background:var(--amber-bg);color:var(--amber-text);border:1px solid var(--amber)}
.badge-sp{background:var(--blue-bg);color:var(--blue-text);border:1px solid var(--blue)}

/* ── ナビ ── */
.nav-wrap{background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 12px;overflow-x:auto;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:2px;padding:6px 0;white-space:nowrap}
.tab{padding:6px 13px;font-size:12px;font-weight:600;border-radius:var(--rsm);border:none;background:none;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .12s;flex-shrink:0}
.tab:hover{background:var(--bg2);color:var(--text)}
.tab.on{background:var(--text);color:var(--bg)}
.pg{display:none}.pg.on{display:block}

/* ── メインレイアウト ── */
#root{max-width:1100px;margin:0 auto;padding:14px 12px 80px}
.save-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);margin-bottom:10px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}

/* ── 月ナビ ── */
.month-nav{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:var(--r);padding:9px 14px;margin-bottom:14px;flex-wrap:wrap;border:1px solid var(--border)}
.mn-btn{background:none;border:1px solid var(--border2);border-radius:var(--rsm);padding:5px 13px;font-size:12px;cursor:pointer;color:var(--text2);font-family:var(--font);font-weight:600}
.mn-btn:hover{background:var(--bg)}
.mn-btn:disabled{opacity:.35;cursor:default}
.mn-label{font-size:15px;font-weight:800;min-width:100px;text-align:center}
.mn-today{background:var(--text);color:var(--bg);border:none;font-size:11px;padding:5px 12px;border-radius:var(--rsm);cursor:pointer;font-family:var(--font);font-weight:700}
.mn-dots{display:flex;gap:4px;flex-wrap:wrap}
.mn-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);cursor:pointer;transition:background .12s}
.mn-dot.has{background:rgba(21,96,184,0.4)}
.mn-dot.cur{background:var(--blue)}
.mn-dot.active{outline:2px solid var(--text);outline-offset:1px}

/* ── グリッド ── */
.g2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:10px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px}
.g5{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:10px}
@media(max-width:680px){
  .g2{grid-template-columns:1fr}
  .g4{grid-template-columns:1fr 1fr}
  .g5{grid-template-columns:1fr 1fr 1fr}
  .pdca-grid{grid-template-columns:1fr!important}
}

/* ── カード ── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rlg);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
.ch{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}

/* ── KPIカード ── */
.kpi{background:var(--bg2);border-radius:var(--r);padding:12px 14px;border:1px solid var(--border);position:relative}
.kl{font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.kv{font-size:28px;font-weight:800;line-height:1;letter-spacing:-.5px}
.ksub{font-size:11px;color:var(--text3);margin-top:3px}
.kbar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.kfill{height:100%;border-radius:2px;transition:width .5s}

/* ── ヒーローKPI（月間合計） ── */
.hero-kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
@media(max-width:680px){.hero-kpi-grid{grid-template-columns:1fr 1fr}}
.hero-kpi{background:var(--bg2);border-radius:var(--rlg);padding:16px 14px 14px;border:1px solid var(--border);text-align:center}
.hk-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.hk-val{font-size:36px;font-weight:800;line-height:1;letter-spacing:-1px}
.hk-sub{font-size:11px;color:var(--text3);margin-top:4px}
.hk-bar{height:4px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.hk-fill{height:100%;border-radius:2px;transition:width .5s}

/* ── シェアカード ── */
.share-card{background:linear-gradient(135deg,var(--blue-bg),var(--green-bg));border:1px solid var(--border);border-radius:var(--rlg);padding:16px 18px;margin-bottom:12px}
.share-card h3{font-size:13px;font-weight:700;margin-bottom:8px}
.share-text{background:var(--bg);border-radius:var(--r);padding:12px 14px;font-size:12px;line-height:1.8;color:var(--text2);border:1px solid var(--border);white-space:pre-wrap;word-break:break-all}
.copy-btn{background:var(--text);color:var(--bg);border:none;border-radius:var(--rsm);padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);margin-top:8px;transition:opacity .12s}
.copy-btn:hover{opacity:.82}
.copy-btn.copied{background:var(--green);color:#fff}

/* ── フォーム ── */
.fl{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;margin-top:10px;font-weight:600}
input,select,textarea{width:100%;padding:10px 11px;border:1px solid var(--border2);border-radius:var(--rsm);font-size:14px;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:2px solid var(--blue);border-color:transparent}
@media(max-width:680px){input,select,textarea{font-size:16px;padding:12px 11px}}
textarea{resize:vertical;line-height:1.6;min-height:68px}
.btn{padding:8px 18px;border-radius:var(--rsm);font-size:13px;cursor:pointer;font-family:var(--font);border:none;font-weight:700;transition:opacity .12s;-webkit-appearance:none}
.btn-p{background:var(--text);color:var(--bg)}.btn-p:hover{opacity:.82}
.btn-g{background:none;border:1px solid var(--border2);color:var(--text2)}.btn-g:hover{background:var(--bg2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-warn{background:none;border:1px solid var(--red);color:var(--red-text);font-size:12px;padding:5px 12px}.btn-warn:hover{background:var(--red-bg)}
.btn-green{background:var(--green-bg);color:var(--green-text);border:1px solid var(--green)}

/* ── +/- ── */
.nc-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:none;cursor:pointer;font-size:18px;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s}
.nc-btn:hover{background:var(--bg2)}
.nc-wrap{display:flex;align-items:center;gap:8px;margin-top:4px}
.nc-input{flex:1;text-align:center;font-size:22px;font-weight:800;padding:6px}

/* ── 気分 ── */
.mood-strip{display:flex;gap:6px}
.mb{flex:1;padding:8px 2px;border-radius:var(--rsm);border:1px solid var(--border);background:none;cursor:pointer;font-size:22px;text-align:center;transition:all .12s}
.mb.on{background:var(--bg2);border-color:var(--border2)}

/* ── セグメント ── */
.seg{display:flex;gap:4px;margin-bottom:10px}
.seg-btn{flex:1;padding:7px;font-size:12px;font-weight:600;border-radius:var(--rsm);border:1px solid var(--border);background:none;cursor:pointer;color:var(--text2);font-family:var(--font);text-align:center}
.seg-btn.on{background:var(--bg2);border-color:var(--border2);color:var(--text)}

/* ── ドット ── */
.dots{display:flex;gap:3px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.dot.hit{background:var(--green)}.dot.cur{background:var(--blue)}

/* ── ファネル ── */
.funnel-wrap{display:flex;flex-direction:column;gap:4px}
.funnel-row{display:flex;align-items:center;gap:8px}
.funnel-label{width:90px;font-size:11px;color:var(--text2);flex-shrink:0;text-align:right;font-weight:600}
.funnel-bar-wrap{flex:1;height:28px;background:var(--bg3);border-radius:5px;overflow:hidden}
.funnel-fill{height:100%;border-radius:5px;transition:width .5s}
.funnel-val{width:36px;font-size:14px;font-weight:800;flex-shrink:0;text-align:right}

/* ── PDCA ── */
.pdca-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:8px;margin-bottom:10px}
.pdca-box{border-radius:var(--r);padding:10px 12px}
.pdca-tag{font-size:10px;font-weight:800;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}

/* ── 思考ログ ── */
.thought{border-left:3px solid var(--border2);padding:5px 12px;margin-bottom:8px}
.thought.s{border-left-color:var(--green)}.thought.f{border-left-color:var(--red)}.thought.h{border-left-color:var(--blue)}
.tl{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.tb{font-size:12px;color:var(--text2);line-height:1.5}

/* ── 日報リスト ── */
.ri{background:var(--bg2);border-radius:var(--r);padding:11px 13px;margin-bottom:8px;cursor:pointer;border:1px solid transparent;transition:all .12s}
.ri:hover{border-color:var(--border2)}
.ri.sel{border-color:var(--blue)!important;background:var(--blue-bg)!important}

/* ── 月比較 ── */
.compare-row{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:6px;transition:background .12s}
.compare-row:last-child{border-bottom:none}
.compare-row:hover,.compare-row.active-month{background:var(--blue-bg);padding:8px 8px}

/* ── 個人目標 ── */
.pg-item{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.pg-item:last-child{border-bottom:none}
.pg-chk{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);background:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .12s}
.pg-chk.done{background:var(--text);border-color:var(--text)}
.pg-chk.done::after{content:'';display:block;width:10px;height:6px;border-left:2px solid var(--bg);border-bottom:2px solid var(--bg);transform:rotate(-45deg) translate(1px,-1px)}
.pgtitle{font-size:13px;line-height:1.4;font-weight:500}
.pgtitle.done{text-decoration:line-through;color:var(--text3)}
.pgcat{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.pgdel{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px 4px;flex-shrink:0}

/* ── 使い方 ── */
.guide-hero{background:var(--blue-bg);border-radius:var(--rlg);padding:22px 24px;margin-bottom:16px;border:1px solid var(--border)}
.guide-hero h2{font-size:20px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px}
.guide-hero p{font-size:13px;color:var(--text2);line-height:1.7}
.step-card{display:flex;gap:13px;padding:13px;background:var(--bg2);border-radius:var(--r);margin-bottom:8px;border:1px solid var(--border)}
.step-num{width:30px;height:30px;border-radius:50%;background:var(--text);color:var(--bg);font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-title{font-size:13px;font-weight:700;margin-bottom:2px}
.step-desc{font-size:12px;color:var(--text2);line-height:1.5}
.step-tip{font-size:11px;color:var(--text3);margin-top:3px;padding:4px 9px;background:var(--bg);border-radius:var(--rsm);border-left:2px solid var(--border2);line-height:1.5}
.uc-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:12px}
@media(max-width:500px){.uc-grid{grid-template-columns:1fr}}
.uc{border-radius:var(--rlg);padding:14px;border:1px solid var(--border)}
.faq-item{padding:11px 0;border-bottom:1px solid var(--border)}
.faq-item:last-child{border-bottom:none}
.faq-q{font-size:13px;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px}
.faq-a{font-size:12px;color:var(--text2);line-height:1.7;padding-top:7px;display:none}

/* ── データ管理 ── */
.data-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);padding:16px;margin-bottom:12px}
.data-box h3{font-size:13px;font-weight:700;margin-bottom:8px}
.stat-num{font-size:30px;font-weight:800;color:var(--blue)}

/* ── フッター ── */
.footer{text-align:center;padding:24px 0 8px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);margin-top:8px}

/* ── トースト ── */
.toast{position:fixed;bottom:28px;right:16px;background:var(--text);color:var(--bg);font-size:13px;font-weight:700;padding:12px 20px;border-radius:var(--r);z-index:9999;font-family:var(--font);box-shadow:0 4px 20px rgba(0,0,0,.2);max-width:80vw}

/* ══ スマホ完全対応 (max-width:680px) ══ */
@media(max-width:680px){
  /* ヘッダー */
  .lp-header{padding:12px 12px 10px}
  .lp-title{font-size:16px}
  .lp-sub{font-size:11px}
  .lp-badges{gap:4px}
  .badge{font-size:10px;padding:2px 8px}

  /* ナビタブ：スクロール固定 */
  .nav-inner{padding:0 8px}
  .tab{padding:7px 10px;font-size:12px}

  /* メイン余白 */
  #root{padding:10px 10px 80px}

  /* 保存バー */
  .save-bar{font-size:11px;margin-bottom:8px}

  /* 月ナビ */
  .month-nav{padding:8px 10px;gap:6px}
  .mn-label{font-size:14px;min-width:84px}
  .mn-btn{padding:5px 10px;font-size:12px}

  /* カード */
  .card{padding:12px 12px;margin-bottom:10px}
  .ch{font-size:13px;margin-bottom:8px}

  /* グリッド：全部1列 */
  .g2,.g3,.g4,.g5{grid-template-columns:1fr;gap:8px}
  .pdca-grid{grid-template-columns:1fr!important;gap:8px}

  /* ヒーローKPI：2列 */
  .hero-kpi-grid{grid-template-columns:1fr 1fr;gap:8px}
  .hero-kpi{padding:12px 10px 10px}
  .hk-label{font-size:10px;margin-bottom:4px}
  .hk-val{font-size:28px}
  .hk-sub{font-size:11px}

  /* KPIカード */
  .kpi{padding:10px 10px}
  .kl{font-size:10px}
  .kv{font-size:20px}

  /* フォーム：大きく見やすく */
  input,select,textarea{
    font-size:16px!important;
    padding:13px 12px!important;
    border-radius:8px;
    line-height:1.5;
  }
  textarea{min-height:88px!important;line-height:1.6!important}
  .fl{font-size:13px;margin-top:12px;margin-bottom:5px}

  /* +/-ボタン：大きく */
  .nc-btn{width:40px;height:40px;font-size:20px}
  .nc-input{font-size:24px!important;padding:8px!important}
  .nc-wrap{gap:8px;margin-top:6px}

  /* ボタン：タップしやすく */
  .btn{padding:12px 20px;font-size:14px;min-height:44px}
  .btn-sm{padding:8px 14px;font-size:12px;min-height:36px}
  .btn-warn{padding:10px 14px;font-size:13px;min-height:40px}
  .btn-green{padding:10px 14px;font-size:13px;min-height:40px}
  .copy-btn{padding:10px 18px;font-size:13px;width:100%;margin-top:10px}

  /* 気分ボタン */
  .mb{padding:10px 2px;font-size:24px}

  /* セグメントボタン */
  .seg-btn{padding:10px;font-size:13px;min-height:44px}

  /* PDCAボックス */
  .pdca-box{padding:10px 10px}
  .pdca-tag{font-size:11px;margin-bottom:6px}

  /* 思考ログ */
  .thought{padding:6px 12px;margin-bottom:10px}
  .tl{font-size:11px}
  .tb{font-size:13px;line-height:1.6}

  /* 日報リスト */
  .ri{padding:12px 12px;margin-bottom:8px}

  /* ファネル */
  .funnel-label{width:72px;font-size:11px}
  .funnel-val{font-size:14px;width:30px}

  /* 月比較 */
  .compare-row{flex-wrap:wrap;gap:4px;padding:8px 4px}
  .compare-row>span:first-child{width:100%;font-size:13px}

  /* ガイド */
  .guide-hero{padding:16px 14px}
  .guide-hero h2{font-size:17px}
  .guide-hero p{font-size:12px}
  .step-card{padding:11px;gap:10px}
  .step-num{width:26px;height:26px;font-size:13px;flex-shrink:0}
  .step-title{font-size:13px}
  .step-desc{font-size:12px}
  .step-tip{font-size:11px}
  .uc-grid{grid-template-columns:1fr!important}
  .uc{padding:12px}
  .faq-q{font-size:13px}
  .faq-a{font-size:12px}

  /* 個人目標 */
  .pg-item{padding:12px 0;gap:10px}
  .pg-chk{width:22px;height:22px}
  .pgtitle{font-size:14px}
  .pgcat{font-size:11px;padding:3px 8px}
  .pgdel{font-size:16px;padding:4px 6px}

  /* データ管理 */
  .data-box{padding:14px}
  .data-box h3{font-size:14px}
  .stat-num{font-size:26px}

  /* シェアカード */
  .share-card{padding:14px}
  .share-text{font-size:13px;line-height:1.9;padding:12px}

  /* 入力ページのボタン行 */
  .report-btn-row{flex-direction:column;gap:8px}
  .report-btn-row .btn{width:100%;text-align:center}

  /* ヒストリー詳細：縦並び */
  #dtl .card{padding:12px}

  /* g5を3列に */
  .g5{grid-template-columns:repeat(3,minmax(0,1fr))!important}

  /* フッター */

function allMs(){const s=new Set(reports.map(r=>r.date.slice(0,7)));s.add(`${NOW.getFullYear()}-${p2(NOW.getMonth()+1)}`);return[...s].sort();}

function mnHTML(){

  return`<div class="month-nav">
    <button class="mn-btn" onclick="chM(-1)">◀</button>

        <div style="font-size:10px;font-weight:700;color:${pc(pP)};margin-top:4px">${pP}%</div>
      </div>
      <div class="hero-kpi">
        <div class="hk-label">今月の成約数</div>
        <div class="hk-val" style="color:var(--green)">${tC}</div>
        <div class="hk-sub">目標 ${goals.monthly.contract}</div>

    </div>`:`
    <div class="g2">

        ${(()=>{const l=isCM()?todR:[...vr].sort((a,b)=>b.date.localeCompare(a.date))[0];return l?`

          <div style="font-size:10px;color:var(--text3);margin-bottom:4px">${l.date}</div>

function genShareText(tA,tP,tC,cR){
  const d=new Date();
  return `📊 ${d.getFullYear()}年${d.getMonth()+1}月の行動記録\n\n行動数　${tA}\n提案数　${tP}\n成約数　${tC}\n成約率　${cR}%\n\n行動管理ダッシュボードで記録中 📈\n#行動管理 #営業 #自己管理`;
}
function copyShare(){
  const el=document.getElementById('share-txt');const btn=document.getElementById('copy-btn');
  if(!el||!btn)return;
  navigator.clipboard?.writeText(el.textContent).then(()=>{btn.textContent='コピーしました！';btn.classList.add('copied');setTimeout(()=>{btn.textContent='テキストをコピー';btn.classList.remove('copied');},2000);}).catch(()=>{const r=document.createRange();r.selectNode(el);window.getSelection()?.removeAllRanges();window.getSelection()?.addRange(r);document.execCommand('copy');btn.textContent='コピーしました！';btn.classList.add('copied');setTimeout(()=>{btn.textContent='テキストをコピー';btn.classList.remove('copied');},2000);});
}

function fnlH(vr){
  const tot={};FUNNEL.forEach(f=>{tot[f.k]=vr.reduce((a,r)=>a+(r[f.k]||0),0);});
  const mx=Math.max(tot[FUNNEL[0].k],1);let h='<div class="funnel-wrap">';
  FUNNEL.forEach((f,i)=>{const v=tot[f.k];const rt=i>0&&tot[FUNNEL[i-1].k]>0?Math.round(v/tot[FUNNEL[i-1].k]*100):null;
    if(i>0)h+=`<div style="text-align:right;font-size:10px;color:var(--text3);padding-right:42px;margin-bottom:-1px;font-weight:600">${rt}%↓</div>`;
    h+=`<div class="funnel-row"><span class="funnel-label">${f.label}</span><div class="funnel-bar-wrap"><div class="funnel-fill" style="width:${Math.max(5,Math.round(v/mx*100))}%;background:${f.c}"></div></div><span class="funnel-val">${v}</span></div>`;
  });return h+'</div>';
}
function lossH(vr){
  const tot={};LOSS.forEach(r=>{tot[r]=vr.reduce((a,rep)=>a+((rep.loss&&rep.loss[r])||0),0);});

}

      <div style="flex:1;height:12px;background:var(--bg3);border-radius:4px;overflow:hidden"><div style="width:${Math.round(ap/mxA*100)}%;height:100%;border-radius:4px;background:var(--blue)"></div></div>
      <span style="font-size:11px;color:var(--text2);width:54px;text-align:right;flex-shrink:0">行動 ${ap}</span>
      <span style="font-size:11px;color:var(--text2);width:50px;text-align:right;flex-shrink:0">提案 ${pp}</span>

}

function aKpi(k,d){const e=document.getElementById('kpi-'+k);if(e)e.value=Math.max(0,(parseInt(e.value)||0)+d);}
function aL(lr,d){const e=document.getElementById('l-'+lid(lr));if(e)e.value=Math.max(0,(parseInt(e.value)||0)+d);}
function pMood(btn){selMood=btn.dataset.mood;document.querySelectorAll('.mb').forEach(b=>b.classList.toggle('on',b===btn));}
function svR(){
  const loss={};LOSS.forEach(lr=>{const e=document.getElementById('l-'+lid(lr));loss[lr]=e?parseInt(e.value)||0:0;});
  const dv=editId?(reports.find(x=>x.id===editId)?.date||td()):(document.getElementById('rd')?.value||td());
  const en={id:editId||uid(),date:dv,approach:parseInt(document.getElementById('kpi-approach')?.value)||0,hearing:parseInt(document.getElementById('kpi-hearing')?.value)||0,proposal:parseInt(document.getElementById('kpi-proposal')?.value)||0,closing:parseInt(document.getElementById('kpi-closing')?.value)||0,contract:parseInt(document.getElementById('kpi-contract')?.value)||0,plan:document.getElementById('rp')?.value||'',action:document.getElementById('rd2')?.value||'',check:document.getElementById('rc')?.value||'',nextAction:document.getElementById('ra')?.value||'',successPattern:document.getElementById('rs')?.value||'',failReason:document.getElementById('rf')?.value||'',hypothesis:document.getElementById('rh')?.value||'',priority1:document.getElementById('r1')?.value||'',priority2:document.getElementById('r2')?.value||'',priority3:document.getElementById('r3')?.value||'',loss,mood:selMood,memo:document.getElementById('rm')?.value||''};
  if(editId){const i=reports.findIndex(r=>r.id===editId);if(i>=0)reports[i]=en;}
  else{const i=reports.findIndex(r=>r.date===dv);if(i>=0)reports[i]=en;else reports.push(en);}
  if(en.successPattern.trim()){const al=patterns.some(p=>p.body===en.successPattern&&p.date===dv);if(!al)patterns.unshift({id:uid(),date:dv,type:'success',title:en.successPattern.slice(0,40),body:en.successPattern,tags:[]});}
  vy=parseInt(dv.slice(0,4));vm=parseInt(dv.slice(5,7));
  const wasE=editId;editId=null;save();toast(wasE?'更新しました':'日報を保存しました');
  if(wasE)sw('history');else rReport();
}
function clrR(){['rp','rd2','rc','ra','rs','rf','rh','r1','r2','r3','rm'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});FUNNEL.forEach(f=>{const e=document.getElementById('kpi-'+f.k);if(e)e.value='0';});LOSS.forEach(lr=>{const e=document.getElementById('l-'+lid(lr));if(e)e.value='0';});}

function rPattern(){
  const succ=patterns.filter(p=>p.type==='success');const fail=patterns.filter(p=>p.type==='fail');const hypo=patterns.filter(p=>p.type==='hypo');
  const form=`<div class="seg" id="pseg"><button class="seg-btn on" data-type="success" onclick="pPT(this)">成功パターン</button><button class="seg-btn" data-type="fail" onclick="pPT(this)">失敗・課題</button><button class="seg-btn" data-type="hypo" onclick="pPT(this)">仮説</button></div>
    <label class="fl" style="margin-top:0">タイトル</label><input id="ptit" placeholder="例：共感ファーストトーク" style="margin-bottom:6px"/>
    <label class="fl" style="margin-top:0">内容・詳細</label><textarea id="pbod" rows="3" placeholder="具体的な状況・言葉・結果"></textarea>
    <label class="fl">タグ（カンマ区切り）</label><input id="ptag" placeholder="ヒアリング, クロージング" style="margin-bottom:10px"/>
    <div style="display:flex;justify-content:flex-end"><button class="btn btn-p" onclick="addPat()">追加</button></div>`;
  document.getElementById('pg-pattern').innerHTML=`<div class="g2"><div class="card"><div class="ch">パターンを追加</div>${form}</div>
    <div>${['success','fail','hypo'].map(type=>{const list=patterns.filter(p=>p.type===type);const ti={success:'成功パターン集',fail:'失敗・課題',hypo:'仮説ログ'};return list.length||type==='success'?`<div class="card"><div class="ch">${ti[type]}<span style="font-size:10px;font-weight:400">${list.length}件</span></div>${list.length?list.map(p=>pCard(p)).join(''):`<div style="font-size:12px;color:var(--text3);padding:8px 0">日報の成功パターン欄から自動追加されます</div>`}</div>`:''}).join('')}</div></div>`;

function pPT(btn){patType=btn.dataset.type;document.querySelectorAll('#pseg .seg-btn').forEach(b=>b.classList.toggle('on',b===btn));}
function addPat(){const t=document.getElementById('ptit')?.value.trim();if(!t){document.getElementById('ptit')?.focus();return;}const tags=document.getElementById('ptag')?.value.split(',').map(x=>x.trim()).filter(Boolean)||[];patterns.unshift({id:uid(),date:td(),type:patType,title:t,body:document.getElementById('pbod')?.value||'',tags});document.getElementById('ptit').value='';document.getElementById('pbod').value='';document.getElementById('ptag').value='';save();rPattern();}
function pCard(p){const cf={success:{bg:'var(--green-bg)',c:'var(--green-text)',l:'成功'},fail:{bg:'var(--red-bg)',c:'var(--red-text)',l:'失敗'},hypo:{bg:'var(--blue-bg)',c:'var(--blue-text)',l:'仮説'}};const s=cf[p.type]||cf.hypo;return`<div class="thought ${p.type==='success'?'s':p.type==='fail'?'f':'h'}" style="margin-bottom:10px;padding:9px 12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:10px;background:${s.bg};color:${s.c};padding:2px 7px;border-radius:4px;font-weight:700">${s.l}</span><span style="font-size:12px;font-weight:700">${p.title}</span></div><button style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px" onclick="dPat('${p.id}')">✕</button></div><div style="font-size:12px;color:var(--text2);line-height:1.5">${p.body}</div>${p.tags.length?`<div style="margin-top:5px;display:flex;gap:4px;flex-wrap:wrap">${p.tags.map(t=>`<span style="font-size:10px;background:var(--bg2);color:var(--text3);padding:1px 7px;border-radius:4px">${t}</span>`).join('')}</div>`:''}<div style="font-size:10px;color:var(--text3);margin-top:4px">${p.date}</div></div>`;}
function dPat(id){if(!confirm('削除しますか？'))return;patterns=patterns.filter(p=>p.id!==id);save();rPattern();}

          </div>

          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px" id="pgcats">${CATS.map(c=>`<button style="padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid ${pgCat===c.k?c.c:'var(--border)'};background:${pgCat===c.k?c.bg:'none'};color:${pgCat===c.k?c.c:'var(--text2)'};font-weight:${pgCat===c.k?700:400};font-family:var(--font)" data-cat="${c.k}" onclick="pCat(this,'${c.bg}','${c.c}')">${c.l}</button>`).join('')}</div>
          <button class="btn btn-p" style="width:100%;font-size:14px;padding:12px" onclick="aPGoal()">追加する</button>
        </div>
        ${done.length?`<div class="card"><div class="ch">達成済み<span style="font-size:10px;font-weight:400">${done.length}件</span></div>${done.map(g=>pgItm(g)).join('')}</div>`:''}
      </div>
      <div class="card">
        <div class="ch">進行中の目標<span style="font-size:10px;font-weight:400">${act.length}件</span></div>
        ${act.length?act.map(g=>pgItm(g)).join(''):`<div style="padding:28px;text-align:center;font-size:13px;color:var(--text3)">目標をまだ登録していません</div>`}
        ${personalGoals.length?`<div style="margin-top:12px;padding:12px;background:var(--bg2);border-radius:var(--r)"><div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px">達成率</div><div style="display:flex;align-items:center;gap:10px"><div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="width:${Math.round(done.length/personalGoals.length*100)}%;height:100%;background:var(--green);border-radius:3px"></div></div><span style="font-size:14px;font-weight:800;color:var(--green)">${Math.round(done.length/personalGoals.length*100)}%</span></div><div style="font-size:11px;color:var(--text3);margin-top:4px">${done.length} / ${personalGoals.length} 件達成</div></div>`:''}
      </div>
    </div>`;
}
function pCat(btn,bg,c){pgCat=btn.dataset.cat;document.querySelectorAll('#pgcats button').forEach(b=>{const s=b===btn;b.style.background=s?bg:'none';b.style.color=s?c:'var(--text2)';b.style.fontWeight=s?700:400;b.style.borderColor=s?c:'var(--border)';});}
function aPGoal(){const t=document.getElementById('pgt')?.value.trim();if(!t){document.getElementById('pgt')?.focus();return;}personalGoals.unshift({id:uid(),title:t,cat:pgCat,due:document.getElementById('pgd')?.value||'',note:document.getElementById('pgn')?.value.trim()||'',done:false});document.getElementById('pgt').value='';document.getElementById('pgd').value='';document.getElementById('pgn').value='';save();rPGoal();}
function tPG(id){const g=personalGoals.find(x=>x.id===id);if(g)g.done=!g.done;save();rPGoal();}
function dPG(id){if(!confirm('削除しますか？'))return;personalGoals=personalGoals.filter(x=>x.id!==id);save();rPGoal();}
function pgItm(g){const cat=CATS.find(c=>c.k===g.cat)||CATS[6];const ov=!g.done&&g.due&&g.due<td();return`<div class="pg-item"><button class="pg-chk${g.done?' done':''}" onclick="tPG('${g.id}')"></button><div style="flex:1;min-width:0"><div class="pgtitle${g.done?' done':''}">${g.title}</div>${g.note?`<div style="font-size:11px;color:var(--text3);margin-top:2px">${g.note}</div>`:''}<div style="display:flex;gap:6px;margin-top:4px;align-items:center;flex-wrap:wrap"><span class="pgcat" style="background:${cat.bg};color:${cat.c}">${cat.l}</span>${g.due?`<span style="font-size:10px;color:${ov?'var(--red-text)':'var(--text3)'};font-weight:${ov?700:400}">${g.due}${ov?' 期限超過':''}</span>`:''}</div></div><button class="pgdel" onclick="dPG('${g.id}')">✕</button></div>`;}

/* ── データ管理 ── */
function rData(){
  const total=reports.length;const months=allMs().filter(ym=>reports.some(r=>r.date.startsWith(ym))).length;
  const kb=(new Blob([JSON.stringify({goals,reports,patterns,personalGoals})]).size/1024).toFixed(1);
  document.getElementById('pg-data').innerHTML=`
    <div class="g3" style="margin-bottom:14px">
      <div class="card" style="text-align:center"><div class="kl">日報件数</div><div class="stat-num">${total}<span style="font-size:16px;font-weight:700">件</span></div></div>
      <div class="card" style="text-align:center"><div class="kl">記録月数</div><div class="stat-num">${months}<span style="font-size:16px;font-weight:700">ヶ月</span></div></div>
      <div class="card" style="text-align:center"><div class="kl">データサイズ</div><div class="stat-num" style="font-size:24px">${kb}<span style="font-size:16px;font-weight:700">KB</span></div></div>
    </div>

    <div class="data-box">
      <h3>エクスポート（バックアップ・データ共有）</h3>
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6">全データのバックアップ、または別デバイスへの移行に使えます。CSVはExcelや他ツールとの連携に便利です。</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-green btn-sm" onclick="expJSON()">JSONでダウンロード（完全バックアップ）</button>
        <button class="btn btn-p btn-sm" onclick="expCSV()">日報をCSVでダウンロード（Excel連携）</button>
      </div>
    </div>

    <div class="data-box">
      <h3>インポート（データの復元）</h3>
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6">エクスポートしたJSONファイルを読み込んで復元できます。<br><strong style="color:var(--red-text)">注意：現在のデータは上書きされます</strong></p>
      <input type="file" id="impFile" accept=".json" style="width:auto" onchange="impJSON(this)"/>
    </div>

    <div class="data-box">
      <h3>このツールについて</h3>
      <div style="font-size:12px;color:var(--text2);line-height:2">
        <div>バージョン: 1.0.0 &nbsp;|&nbsp; ライセンス: 完全無料・個人利用・商用利用可</div>
        <div>データ保存: このブラウザのlocalStorageのみ（外部送信なし）</div>
        <div>動作環境: Chrome / Safari / Firefox / Edge（最新版推奨）</div>
        <div style="margin-top:8px;padding:10px 12px;background:var(--blue-bg);border-radius:var(--rsm);color:var(--blue-text)">データはこのデバイス・このブラウザにのみ保存されます。シークレットモードでは保存されません。別デバイスで使う場合はJSONエクスポートでデータを移してください。</div>
      </div>
    </div>

    <div class="data-box" style="border:1px solid var(--red)">
      <h3 style="color:var(--red-text)">データの消去</h3>
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px">このブラウザのすべてのデータを削除します。取り消せません。</p>
      <button class="btn btn-warn" onclick="clearAll()">すべてのデータを消去する</button>
    </div>
  `;
}
function expJSON(){const data={version:'1.0',exportedAt:new Date().toISOString(),goals,reports,patterns,personalGoals};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`action-dashboard-${td()}.json`;a.click();URL.revokeObjectURL(a.href);toast('JSONをダウンロードしました');}
function expCSV(){const h='日付,アプローチ,ヒアリング,提案,クロージング,成約,計画,行動,評価,改善,成功パターン,仮説,気分';const rows=reports.sort((a,b)=>a.date.localeCompare(b.date)).map(r=>[r.date,r.approach||0,r.hearing||0,r.proposal||0,r.closing||0,r.contract||0,`"${(r.plan||'').replace(/"/g,'""')}"`,`"${(r.action||'').replace(/"/g,'""')}"`,`"${(r.check||'').replace(/"/g,'""')}"`,`"${(r.nextAction||'').replace(/"/g,'""')}"`,`"${(r.successPattern||'').replace(/"/g,'""')}"`,`"${(r.hypothesis||'').replace(/"/g,'""')}"`,r.mood||''].join(','));const csv='\uFEFF'+h+'\n'+rows.join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`daily-reports-${td()}.csv`;a.click();URL.revokeObjectURL(a.href);toast('CSVをダウンロードしました');}
function impJSON(input){const f=input.files[0];if(!f)return;const reader=new FileReader();reader.onload=e=>{try{const d=JSON.parse(e.target.result);if(!confirm(`インポートしますか？\n日報 ${d.reports?.length||0}件\n現在のデータは上書きされます`))return;if(d.goals)goals=d.goals;if(d.reports)reports=d.reports;if(d.patterns)patterns=d.patterns;if(d.personalGoals)personalGoals=d.personalGoals;save();toast('インポートしました');rData();}catch(err){toast('インポート失敗：ファイル形式が正しくありません','#aa2c2c');}};reader.readAsText(f,'UTF-8');}
function clearAll(){if(!confirm('すべてのデータを消去しますか？\nこの操作は取り消せません。'))return;if(!confirm('本当に消去しますか？'))return;localStorage.removeItem(KEY);goals={daily:{approach:20,hearing:8,proposal:3,closing:2,contract:1},monthly:{approach:400,hearing:160,proposal:60,closing:40,contract:20}};reports=[];patterns=[];personalGoals=[];toast('データを消去しました','#aa2c2c');rData();}

/* ── 使い方ガイド ── */

    </div>

               {bg:'#ede8fe',tc:'#36267a',ic:'📚',t:'勉強・スキル',b:'学習時間・問題演習\n仮説検証・振り返り'}
            ].map(u=>`<div class="uc" style="background:${u.bg}"><div style="font-size:24px;margin-bottom:7px">${u.ic}</div><div style="font-size:13px;font-weight:700;color:${u.tc};margin-bottom:4px">${u.t}</div><div style="font-size:12px;color:${u.tc};opacity:.8;white-space:pre-line;line-height:1.6">${u.b}</div></div>`).join('')}
          </div>
        </div>
        <div class="card"><div class="ch">はじめかた（4ステップ）</div>
          ${[{n:1,t:'目標設定タブで目標を設定する',d:'5指標の日次・月間目標を入力。ダイエットなら「運動回数」「食事管理」などに読み替えてOK。',tip:'最初はざっくりでOK。使いながら調整できます'},
            {n:2,t:'個人目標タブに大きな目標を書く',d:'「3ヶ月で5kg痩せる」「月収20万達成」など、カテゴリ別に目標を登録。',tip:'書いて可視化するだけで行動が変わります'},
            {n:3,t:'毎日、日報入力タブで記録する',d:'KPI+PDCA+成功パターン+仮説+明日の重点行動を5〜10分で。データは自動保存。',tip:'成功パターン欄は必ず埋めましょう'},
            {n:4,t:'ホームで月別KPIを確認してシェアする',d:'行動数・提案数・成約数・成約率が大きく表示されます。シェア用テキストをワンクリックでコピーできます。',tip:'月をまたいだ比較で自分の成長が見えます'}
          ].map(s=>`<div class="step-card"><div class="step-num">${s.n}</div><div><div class="step-title">${s.t}</div><div class="step-desc">${s.d}</div><div class="step-tip">${s.tip}</div></div></div>`).join('')}
        </div>
      </div>
      <div>
        <div class="card"><div class="ch">日報の書き方（記入例）</div>
          ${[{title:'営業の場合',items:[{l:'① KPI',c:'#0b3878',bg:'#e6f0fc',v:'アプローチ 22件 / 提案 3件 / 成約 1件'},{l:'② PDCA',c:'#064d36',bg:'#e1f4ec',v:'P: 新規20件\nD: 午前架電・午後商談\nC: 成約1件、ヒアリング率↑\nA: 冒頭の質問を変える'},{l:'③ 成功パターン',c:'#62180a',bg:'#fde8e2',v:'「今どんな悩みがありますか？」と聞いたら相手が話し始めた'},{l:'④ 明日の重点行動',c:'#36267a',bg:'#ede8fe',v:'① 同じ質問パターンで試す\n② 検討中3社にフォロー\n③ 提案資料2パターン作成'}]},
            {title:'ダイエットの場合',items:[{l:'① 行動量',c:'#0b3878',bg:'#e6f0fc',v:'ウォーキング 8000歩 / 筋トレ 30分 / 食事管理 ◯'},{l:'② PDCA',c:'#064d36',bg:'#e1f4ec',v:'P: 昼食をサラダに変える\nD: 朝に30分ウォーキング実施\nC: 体重 −0.3kg\nA: 夕食後デザートをやめる'},{l:'③ 成功パターン',c:'#62180a',bg:'#fde8e2',v:'朝に運動を先にやると食事制限への意識が自然と上がる'},{l:'④ 明日の重点行動',c:'#36267a',bg:'#ede8fe',v:'① 夕食後はフルーツのみ\n② 昼食は持参弁当\n③ 就寝前ストレッチ10分'}]}
          ].map(ex=>`<div style="border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px"><div style="background:var(--bg2);padding:8px 13px;font-size:11px;font-weight:700;border-bottom:1px solid var(--border)">${ex.title}</div><div style="padding:10px 12px;display:flex;flex-direction:column;gap:7px">${ex.items.map(r=>`<div style="background:${r.bg};border-radius:var(--rsm);padding:8px 11px"><div style="font-size:10px;font-weight:700;color:${r.c};margin-bottom:2px">${r.l}</div><div style="font-size:12px;white-space:pre-line;line-height:1.5">${r.v}</div></div>`).join('')}</div></div>`).join('')}

        <div class="card"><div class="ch">よくある質問</div>
          ${[{q:'データはどこに保存されますか？',a:'このブラウザのlocalStorageにのみ保存されます。外部サーバーへは一切送信されません。シークレットモードでは保存されません。'},
            {q:'スマホでも使えますか？',a:'はい。スマホのブラウザ（Chrome / Safari）で開いてください。画面サイズに最適化されています。'},

            {q:'過去の日報を修正・削除したい',a:'日報履歴タブでその月に切り替えて対象の日報をクリック →「編集」または「削除」ボタンを使います。'},
            {q:'SNSでシェアするには？',a:'記録を入力後、ホームタブに「SNSシェア用サマリー」が表示されます。ワンクリックでテキストをコピーしてそのまま投稿できます。'}
          ].map((f,i)=>`<div class="faq-item"><div class="faq-q" onclick="tFaq(${i})"><span>Q. ${f.q}</span><span id="fi${i}" style="flex-shrink:0;color:var(--text3);font-size:16px">＋</span></div><div class="faq-a" id="fa${i}">${f.a}</div></div>`).join('')}

    <div style="text-align:center;padding:8px 0 12px">
      <button class="btn btn-p" style="padding:13px 32px;font-size:15px" onclick="sw('report')">日報入力を始める →</button>
    </div>`;
}
function tFaq(i){const a=document.getElementById('fa'+i);const ic=document.getElementById('fi'+i);if(!a||!ic)return;const op=a.style.display!=='block';a.style.display=op?'block':'none';ic.textContent=op?'−':'＋';}

/* ── ユーティリティ ── */
function getLast14(){const res=[];for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;res.push(reports.find(r=>r.date===ds)||{date:ds,approach:0});}return res;}
function bDots(){return getLast14().map((r,i)=>{const h=(r.approach||0)>0||(r.contract||0)>0;return`<div class="dot${i===13?' cur':h?' hit':''}"></div>`;}).join('');}
function calcS(){let s=0;for(let i=0;i<90;i++){const d=new Date();d.setDate(d.getDate()-i);const ds=`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;if(reports.find(r=>r.date===ds))s++;else break;}return s;}

/* ── 起動 ── */
load();
document.getElementById('pg-guide').querySelector && rGuide();
</script>
